<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Números Disponibles — Rifas El Mucha</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', sans-serif;
  }

  /* Pantalla tipo 9:16 (vertical, como un reel) */
  .screen {
    width: 390px;
    height: 693px;
    background: #080808;
    border: 1px solid #2a2000;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 0 60px rgba(201,162,39,0.15);
  }

  /* Fondo con partículas doradas sutiles */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(201,162,39,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Logo Rifas El Mucha */
  .logo {
    margin-top: 28px;
    text-align: center;
    z-index: 2;
  }
  .logo-inner {
    display: inline-block;
    border: 2px solid #C9A227;
    padding: 5px 20px 6px;
    background: linear-gradient(135deg, #111, #1e1600);
    box-shadow: 0 0 20px rgba(201,162,39,0.4), inset 0 1px 0 rgba(255,220,100,0.1);
    border-radius: 4px;
  }
  .logo-small {
    font-size: 9px;
    letter-spacing: 7px;
    color: #C9A227;
    display: block;
    font-weight: 900;
  }
  .logo-big {
    font-size: 28px;
    letter-spacing: 3px;
    color: #fff;
    display: block;
    line-height: 1;
    text-shadow: 0 0 20px rgba(201,162,39,0.6), 1px 1px 0 #000;
    font-weight: 900;
  }

  /* Línea dorada separadora */
  .gold-line {
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A227, transparent);
    margin: 14px auto 0;
  }

  /* Título */
  .titulo {
    font-size: 11px;
    letter-spacing: 4px;
    color: #C9A227;
    text-transform: uppercase;
    margin-top: 14px;
    z-index: 2;
  }

  /* Contador de vendidos */
  .stats {
    display: flex;
    gap: 24px;
    margin-top: 10px;
    z-index: 2;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
  }
  .stat-num.vendidos { color: #e03030; }
  .stat-num.disponibles { color: #C9A227; }
  .stat-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Grid de números */
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    padding: 12px 14px;
    margin-top: 8px;
    z-index: 2;
    width: 100%;
  }

  .num-box {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 900;
    border-radius: 4px;
    border: 1px solid #2a2000;
    background: #111;
    color: #C9A227;
    position: relative;
    transition: all 0.3s;
    cursor: default;
  }

  .num-box.vendido {
    background: #1a0000;
    border-color: #3a0000;
    color: #3a0000;
  }

  .num-box.vendido::after {
    content: '✕';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e03030;
    font-size: 11px;
    font-weight: 900;
    opacity: 0;
    animation: none;
  }

  .num-box.vendido.visible::after {
    opacity: 1;
  }

  /* Efecto de aparición del ✕ */
  @keyframes tachar {
    0%   { transform: scale(2); opacity: 0; }
    60%  { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .num-box.animando::after {
    animation: tachar 0.25s ease forwards;
  }

  /* Texto final */
  .final-text {
    z-index: 2;
    text-align: center;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .final-text.show { opacity: 1; }
  .final-text p {
    font-size: 10px;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
  }
  .final-text strong {
    display: block;
    font-size: 16px;
    color: #C9A227;
    letter-spacing: 1px;
    margin-top: 4px;
    text-shadow: 0 0 20px rgba(201,162,39,0.8);
  }

  /* Botón reiniciar */
  .btn-restart {
    margin-top: 16px;
    padding: 8px 24px;
    background: transparent;
    border: 1px solid #C9A227;
    color: #C9A227;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    z-index: 2;
    transition: all 0.2s;
    font-weight: 900;
  }
  .btn-restart:hover { background: rgba(201,162,39,0.1); }

  /* Info lateral */
  .info {
    position: absolute;
    right: -220px;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    color: #666;
    font-family: Arial, sans-serif;
    font-size: 12px;
    line-height: 1.6;
  }
  .info h3 { color: #C9A227; margin-bottom: 8px; font-size: 13px; }
  .info p { margin-bottom: 6px; }

  .wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="screen" id="screen">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-inner">
        <span class="logo-small">R I F A S</span>
        <span class="logo-big">EL MUCHA</span>
      </div>
    </div>

    <div class="gold-line"></div>
    <div class="titulo">Números disponibles</div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-num vendidos" id="count-vendidos">0</div>
        <div class="stat-label">Vendidos</div>
      </div>
      <div class="stat">
        <div class="stat-num disponibles" id="count-disponibles">100</div>
        <div class="stat-label">Disponibles</div>
      </div>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid"></div>

    <!-- Texto final -->
    <div class="final-text" id="final">
      <p>¿El tuyo todavía está?</p>
      <strong>¡Aparta el tuyo ya!</strong>
    </div>

    <button class="btn-restart" onclick="reiniciar()">↺ &nbsp; Repetir</button>
  </div>

  <!-- Info -->
  <div class="info">
    <h3>Vista previa</h3>
    <p>Formato 9:16<br>(Reel / Story)</p>
    <p style="margin-top:12px; color:#444;">El ✕ aparece<br>uno por uno con<br>sonido de clic</p>
    <p style="margin-top:12px; color:#444;">60% vendidos<br>40% disponibles</p>
  </div>
</div>

<script>
  const TOTAL = 100;
  const VENDIDOS_PCT = 0.60;
  const TOTAL_VENDIDOS = Math.round(TOTAL * VENDIDOS_PCT);

  // Audio: click sintético con Web Audio API
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTick() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.1);
  }

  // Generar grilla
  const grid = document.getElementById('grid');
  const boxes = [];

  for (let i = 1; i <= TOTAL; i++) {
    const box = document.createElement('div');
    box.className = 'num-box';
    box.textContent = String(i).padStart(2, '0');
    box.id = `n${i}`;
    grid.appendChild(box);
    boxes.push(box);
  }

  // Elegir cuáles son vendidos aleatoriamente
  function shuffled(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let vendidosIndices = [];
  let animTimeout = null;

  function iniciar() {
    vendidosIndices = shuffled([...Array(TOTAL).keys()]).slice(0, TOTAL_VENDIDOS);
    vendidosIndices.sort((a, b) => a - b);

    let step = 0;
    const countEl = document.getElementById('count-vendidos');
    const dispEl = document.getElementById('count-disponibles');
    const finalEl = document.getElementById('final');

    function tachar() {
      if (step >= vendidosIndices.length) {
        finalEl.classList.add('show');
        return;
      }

      const idx = vendidosIndices[step];
      const box = boxes[idx];
      box.classList.add('vendido', 'animando', 'visible');
      playTick();

      countEl.textContent = step + 1;
      dispEl.textContent = TOTAL - (step + 1);

      setTimeout(() => box.classList.remove('animando'), 300);

      step++;
      // Velocidad: rápido al inicio, más lento al final para drama
      const delay = step < 40 ? 60 : step < 55 ? 100 : 180;
      animTimeout = setTimeout(tachar, delay);
    }

    tachar();
  }

  function reiniciar() {
    if (animTimeout) clearTimeout(animTimeout);
    boxes.forEach(b => {
      b.className = 'num-box';
      b.textContent = b.textContent; // keep number
    });
    // rebuild text
    for (let i = 0; i < boxes.length; i++) {
      boxes[i].textContent = String(i + 1).padStart(2, '0');
    }
    document.getElementById('count-vendidos').textContent = '0';
    document.getElementById('count-disponibles').textContent = '100';
    document.getElementById('final').classList.remove('show');
    setTimeout(iniciar, 400);
  }

  // Arrancar automático
  window.addEventListener('click', () => audioCtx.resume(), { once: true });
  iniciar();
</script>
</body>
</html>
